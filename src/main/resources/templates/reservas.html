<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Salidas | Miyabi Admin</title>

    <th:block th:replace="~{fragments/admin_layout :: admin-head}"></th:block>
    
    <style>
        /* Estilos específicos para los estados en la tabla */
        .pill {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .pill-checkout {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .pill-active {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .miyabi-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .miyabi-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #eee;
        }
        .miyabi-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="admin-wrapper">
        <div th:replace="~{fragments/admin_layout :: admin-sidebar}"></div>

        <main class="admin-main-content">
            <header class="section-header" style="margin-bottom: 30px;">
                <h2 style="font-family: serif; font-size: 2rem;">Gestión de Salidas</h2>
                <p style="color: #666;">Panel de control para facturación y cierre de estadías.</p>
            </header>

            <table class="miyabi-table">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Huésped</th>
                        <th>Habitación</th>
                        <th>Total a Pagar</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
					<tr th:each="reserva : ${reservations}">
					    <td th:text="${reserva.reservationCode != null ? reserva.reservationCode : 'S/N'}" style="font-weight: bold; color: #b99d61;"></td>
					    
					    <td th:text="${reserva.guest != null ? reserva.guest.names + ' ' + reserva.guest.surnames : 'Sin Huésped'}"></td>
					    
					    <td>
					        <div th:if="${reserva.room != null}">
					            <span th:text="${'Hab. ' + reserva.room.roomNumber}"></span><br>
					            <small th:text="${reserva.room.roomType != null ? reserva.room.roomType.nameType : ''}" style="color: #999;"></small>
					        </div>
					        <span th:unless="${reserva.room != null}">Sin asignar</span>
					    </td>

					    <td th:text="${'S/ ' + (reserva.totalPay != null ? reserva.totalPay : '0.00')}"></td>
					    
					    <td>
					        <span th:text="${reserva.status != null ? reserva.status : 'PENDIENTE'}" 
					              th:classappend="${reserva.status == 'CHECKOUT' ? 'pill pill-checkout' : 'pill pill-active'}">
					        </span>
					    </td>

					    <td>
					        <button th:if="${reserva.status == 'CHECKOUT'}" 
					                class="btn-admin-action"
					                th:onclick="|emitirBoleta(${reserva.idReservation})|">
					            🖨️ Emitir Boleta
					        </button>

					        <span th:unless="${reserva.status == 'CHECKOUT'}" style="color: #aaa; font-size: 0.8rem; font-style: italic;">
					            En curso...
					        </span>
					    </td>
					</tr>

                    <tr th:if="${#lists.isEmpty(reservations)}">
                        <td colspan="6" style="text-align: center; padding: 50px; color: #999;">
                            No se encontraron reservas registradas.
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <script>
        /**
         * Lógica para abrir la boleta PDF
         * Llama al endpoint de JasperReports en BoletaEmitirController
         */
        function emitirBoleta(id) {
            if (!id) return;
            
            const url = `/api/boleta-digital/descargar/${id}`;
            const win = window.open(url, '_blank');
            
            if (win) {
                win.focus();
            } else {
                alert('Por favor, permite las ventanas emergentes para ver la boleta.');
            }
        }
    </script>
</body>
</html>
